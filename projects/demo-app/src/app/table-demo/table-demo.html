<div style="padding: 24px; max-width: 1200px; margin: 0 auto;">
  <h1 style="font-size: 24px; font-weight: 700; margin-bottom: 24px;">MnTable Demo</h1>

  <!-- Basic table -->
  <section style="margin-bottom: 48px;">
    <h2 style="font-size: 18px; font-weight: 600; margin-bottom: 12px;">Basic Table (string columns, sorting, hover)</h2>
    <mn-table [dataSource]="basicDataSource" (sortChange)="onSortChange($event)"></mn-table>
  </section>

  <!-- Selection table -->
  <section style="margin-bottom: 48px;">
    <h2 style="font-size: 18px; font-weight: 600; margin-bottom: 12px;">Multi-Select Table</h2>
    <mn-table [dataSource]="selectionDataSource" (selectionChange)="onSelectionChange($event)"></mn-table>
    <p style="margin-top: 8px; font-size: 14px; color: #666;">Selected: {{ selectedNames }}</p>
  </section>

  <!-- Row actions table -->
  <section style="margin-bottom: 48px;">
    <h2 style="font-size: 18px; font-weight: 600; margin-bottom: 12px;">Table with Row Actions</h2>
    <mn-table [dataSource]="actionsDataSource"></mn-table>
  </section>

  <!-- Searchable table with load more -->
  <section style="margin-bottom: 48px;">
    <h2 style="font-size: 18px; font-weight: 600; margin-bottom: 12px;">Searchable Table with Load More</h2>
    <mn-table [dataSource]="searchDataSource"></mn-table>
  </section>

  <!-- Empty table -->
  <section style="margin-bottom: 48px;">
    <h2 style="font-size: 18px; font-weight: 600; margin-bottom: 12px;">Empty Table</h2>
    <mn-table [dataSource]="emptyDataSource"></mn-table>
  </section>
</div>
