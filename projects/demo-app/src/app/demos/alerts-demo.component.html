<demo-page [title]="'Alerts Demo'">
  <div class="controls mb-6" demo-actions>
    <div class="flex flex-wrap gap-2 items-center">
      <button mnButton [data]="{ variant: 'outline', color: 'primary' }" (click)="show('info')">Info</button>
      <button mnButton [data]="{ variant: 'outline', color: 'success' }" (click)="show('success')">Success</button>
      <button mnButton [data]="{ variant: 'outline', color: 'danger' }" (click)="show('error')">Error</button>
      <button mnButton [data]="{ variant: 'outline', color: 'warning' }" (click)="show('warning')">Warning</button>
      <div class="h-6 w-px bg-gray-200 mx-1"></div>
      <button mnButton [data]="{ variant: 'text', color: 'secondary' }" (click)="showCustomDuration()">Custom Duration</button>
      <button mnButton [data]="{ variant: 'text', color: 'secondary' }" (click)="showCustomClass()">Custom CSS Class</button>
      <button mnButton [data]="{ variant: 'fill', color: 'danger' }" class="ml-auto" (click)="clearAll()">Clear All</button>
    </div>
  </div>

  <section class="inputs">
    <div class="field">
      <label class="text-sm font-medium text-gray-700">Title</label>
      <input type="text" [(ngModel)]="titleInput" placeholder="Title (optional)" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" />
    </div>
    <div class="field">
      <label class="text-sm font-medium text-gray-700">Subtitle</label>
      <input type="text" [(ngModel)]="subTitleInput" placeholder="Subtitle (optional)" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" />
    </div>
    <div class="field">
      <label class="text-sm font-medium text-gray-700">Custom duration (ms)</label>
      <input type="number" min="0" [(ngModel)]="durationInputMs" placeholder="e.g. 2000" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" />
    </div>
  </section>

  <div class="mt-8 border-t pt-6">
    <h3 class="text-lg font-medium mb-4">Alert Style Variants</h3>
    <div class="flex flex-wrap gap-3">
      <div class="flex flex-col gap-2">
        <span class="text-xs text-gray-500 font-medium px-1 uppercase tracking-wider">Soft (Default)</span>
        <button mnButton [data]="{ variant: 'fill', color: 'primary' }" (click)="alerts.info('Soft Variant', 'This is the default soft variant', { variant: 'soft' })">Show Info (Soft)</button>
      </div>
      <div class="flex flex-col gap-2">
        <span class="text-xs text-gray-500 font-medium px-1 uppercase tracking-wider">Fill</span>
        <button mnButton [data]="{ variant: 'outline', color: 'success' }" (click)="alerts.success('Fill Variant', 'This is the fill variant', { variant: 'fill' })">Show Success (Fill)</button>
      </div>
      <div class="flex flex-col gap-2">
        <span class="text-xs text-gray-500 font-medium px-1 uppercase tracking-wider">Outline</span>
        <button mnButton [data]="{ variant: 'outline', color: 'warning' }" (click)="alerts.warning('Outline Variant', 'This is the outline variant', { variant: 'outline' })">Show Warning (Outline)</button>
      </div>
    </div>
  </div>

  <mn-alert-outlet />
</demo-page>
