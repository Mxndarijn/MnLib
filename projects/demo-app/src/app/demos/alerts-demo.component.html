<demo-page [title]="'Alerts Demo'">
<!--  TODO fix buttons-->
  <div class="controls" demo-actions>
    <button mnButton variant="outline" color="primary" (click)="show('info')">Info</button>
    <button mnButton variant="outline" color="primary" (click)="show('success')">Success</button>
    <button mnButton variant="outline" color="primary" (click)="show('error')">Error</button>
    <button mnButton variant="outline" color="primary" (click)="show('warning')">Warning</button>
    <button mnButton variant="outline" color="primary" (click)="showCustomDuration()">Custom Duration</button>
    <button mnButton variant="outline" color="primary" (click)="showCustomClass()">Custom CSS Class</button>
    <button mnButton variant="outline" color="primary" style="margin-left:auto" (click)="clearAll()">Clear All</button>
  </div>

  <section class="inputs">
    <div class="field">
      <label class="text-sm font-medium text-gray-700">Title</label>
      <input type="text" [(ngModel)]="titleInput" placeholder="Title (optional)" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" />
    </div>
    <div class="field">
      <label class="text-sm font-medium text-gray-700">Subtitle</label>
      <input type="text" [(ngModel)]="subTitleInput" placeholder="Subtitle (optional)" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" />
    </div>
    <div class="field">
      <label class="text-sm font-medium text-gray-700">Custom duration (ms)</label>
      <input type="number" min="0" [(ngModel)]="durationInputMs" placeholder="e.g. 2000" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" />
    </div>
  </section>

  <div class="mt-8">
    <h3 class="text-lg font-medium mb-4">Variants Demo</h3>
    <div class="flex gap-2">
      <button mnButton (click)="alerts.info('Soft Variant', 'This is the default soft variant', { variant: 'soft' })">Soft (Default)</button>
      <button mnButton (click)="alerts.success('Fill Variant', 'This is the fill variant', { variant: 'fill' })">Fill</button>
      <button mnButton (click)="alerts.warning('Outline Variant', 'This is the outline variant', { variant: 'outline' })">Outline</button>
    </div>
  </div>

  <mn-alert-outlet />
</demo-page>
