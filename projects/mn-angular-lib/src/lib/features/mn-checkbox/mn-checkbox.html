<div [class.is-fullwidth]="props.fullWidth" class="flex flex-col items-start">
  <label [attr.for]="resolvedId" [ngClass]="wrapperClasses"
         class="flex flex-row items-center gap-x-2 select-none cursor-pointer">
    <input
      type="checkbox"
      class="checkbox checkbox-primary"
      [id]="resolvedId"
      [attr.name]="resolvedName"
      [attr.aria-label]="uiConfig.ariaLabel || uiConfig.label || props.label || null"
      [attr.aria-invalid]="showError || null"
      [attr.aria-describedby]="showError ? resolvedId + '-error' : null"
      [disabled]="isDisabled"
      [checked]="value"
      [ngClass]="checkboxClasses"
      (change)="handleChange($any($event.target).checked)"
      (blur)="handleBlur()"
    />
    @if (uiConfig.label || props.label) {
      <span class="flex flex-row items-center gap-x-0.5">
        <span>{{ uiConfig.label || props.label }}</span>
        @if (isRequired()) {
          <span class="text-red-500">*</span>
        }
      </span>
    }
  </label>

  @if (showError) {
    @if (props.showAllErrors) {
      <div class="flex flex-col gap-y-1 mt-1">
        @for (error of errorMessages; track $index) {
          <mn-error-message [errorMessage]="error" [id]="resolvedId + '-' + $index"></mn-error-message>
        }
      </div>
    } @else {
      @if (errorMessage !== null) {
        <mn-error-message [errorMessage]="errorMessage" [id]="resolvedId"></mn-error-message>
      }
    }
  }
</div>
