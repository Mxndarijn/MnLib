@if (alerts$ | async; as alerts) {
  <div class="fixed top-4 right-4 z-[9999] flex flex-col gap-3 w-full max-w-sm">
    @for (a of alerts; track trackById($index, a)) {
      @if (template) {
        <ng-container
          [ngTemplateOutlet]="template"
          [ngTemplateOutletContext]="contextFor(a)">
        </ng-container>
      } @else {
        <div [class]="getAlertClasses(a)" [class.extra]="a.cssClass">
          <div class="flex-1 min-w-0">
            <h4 class="font-semibold text-sm">{{ a.title }}</h4>
            @if (a.subTitle) {
              <p class="text-sm mt-1 opacity-90 leading-tight">{{ a.subTitle }}</p>
            }
          </div>
          <button
            (click)="dismissAlert(a.id)"
            class="shrink-0 inline-flex items-center justify-center h-5 w-5 rounded-full hover:bg-black/5 transition-colors"
            aria-label="Close"
          >
            <span class="text-lg leading-none">&times;</span>
          </button>
        </div>
      }
    }
  </div>
}
