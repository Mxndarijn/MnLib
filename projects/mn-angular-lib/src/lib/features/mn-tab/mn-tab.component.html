<div class="w-full mb-10 flex justify-center">
  <div class="inline-flex rounded-lg p-2 bg-base-100 shadow-md">
    <div role="tablist" class="tabs flex">
      @for (item of dataSource.items; track item.label) {
        <div
          role="tab"
          class="tab px-4 min-w-36 py-2 border-b-2 cursor-pointer select-none transition-colors"
          [class.text-brand-500]="currentActive === item"
          [class.font-bold]="currentActive === item"
          [class.border-brand-500]="currentActive === item"
          [class.border-base-300]="currentActive !== item"
          [class.text-base-content]="currentActive !== item"
          [attr.aria-selected]="currentActive === item"
          (click)="setActive(item)"
        >
          {{ item.label | mnTranslate }}
        </div>
      }
    </div>
  </div>
</div>
