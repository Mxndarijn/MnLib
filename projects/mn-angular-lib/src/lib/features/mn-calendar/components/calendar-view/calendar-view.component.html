<div class="calendar-view" role="application" aria-label="Calendar">
  <div class="calendar-toolbar">
    <div class="toolbar-left">
      <button mnButton [data]="{ size: 'md', variant: 'fill', color: 'primary' }"  (click)="goToToday()">{{ config.todayLabel }}</button>
      <div class="date-nav">
        <button mnButton [data]="{ size: 'md', variant: 'outline', color: 'gray' }"  (click)="navigatePrevious()" aria-label="Previous">&#8249;</button>
        <mn-lib-datetime [props]="{ id: 'calendar-date-picker', mode: 'date', size: 'md' }" [ngModel]="dateInputValue" (ngModelChange)="onDateStringChange($event)"></mn-lib-datetime>
        <button mnButton [data]="{ size: 'md', variant: 'outline', color: 'gray' }"  (click)="navigateNext()" aria-label="Next">&#8250;</button>
      </div>
      <div class="view-switcher" role="tablist" aria-label="Calendar view">
        @for (view of viewOptions; track view.value) {
          <button
            mnButton
            [data]="{ size: 'md', variant: currentView === view.value ? 'fill' : 'text', color: 'primary' }"
            role="tab"
            [attr.aria-selected]="currentView === view.value"
            (click)="switchView(view.value)">
            {{ view.label }}
          </button>
        }
      </div>
    </div>
    <div class="toolbar-right">
      @for (btn of buttons; track btn.label) {
        <button mnButton [data]="btn.buttonData || {}" (click)="btn.onClick()">
          {{ btn.label }}
        </button>
      }
      @if (showButton) {
        <button mnButton [data]="{}" (click)="ButtonClickedEvent.emit()">
          {{ buttonTitle }}
        </button>
      }
    </div>
  </div>
  <div class="calendar-content">
    <div class="calendar-main">
      @if (currentView === CalendarView.MONTH) {
        <app-calendar-month
          [focusDay]="focusDay"
          [eventsChanged]="internalEventsChanged"
          [focusDayChanged]="internalFocusDayChanged"
          [config]="config"
          (dayClicked)="onMonthDayClick($event)">
        </app-calendar-month>
      }
      @if (currentView === CalendarView.WEEK) {
        <app-calendar-week
          [focusDay]="focusDay"
          [eventsChanged]="internalEventsChanged"
          [focusDayChanged]="internalFocusDayChanged"
          [config]="config"
          [calendarEventComponent]="CalendarEventComponent"
          (eventClicked)="onEventClick($event)">
        </app-calendar-week>
      }
      @if (currentView === CalendarView.DAY) {
        <app-calendar-day
          [focusDay]="focusDay"
          [eventsChanged]="internalEventsChanged"
          [focusDayChanged]="internalFocusDayChanged"
          [config]="config"
          [calendarEventComponent]="CalendarEventComponent"
          (eventClicked)="onEventClick($event)">
        </app-calendar-day>
      }
    </div>
    <div class="calendar-sidebar">
      <app-upcoming-events
        [eventsChanged]="internalEventsChanged"
        [config]="config"
        (eventClicked)="onEventClick($event)">
      </app-upcoming-events>
    </div>
  </div>
</div>
