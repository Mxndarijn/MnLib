<div class="calendar-month" role="grid" aria-label="Month view">
  <div class="month-header">
    @for (day of longDayNames; track day) {
      <div class="day-header" role="columnheader">{{ day }}</div>
    }
  </div>
  <div class="month-grid">
    @for (item of monthItems; track item.date.getTime()) {
      <div
        class="month-cell"
        [class.other-month]="!item.isCurrentMonth"
        [class.today]="item.isToday"
        (click)="onDayClick(item.date)"
        role="gridcell"
        [attr.aria-label]="item.date.toDateString()">
        <span class="day-number">{{ item.dayNumber }}</span>
        <div class="month-events">
          @for (event of item.events.slice(0, 3); track $index) {
            <div
              class="month-event-dot"
              [style.background-color]="event.color.primaryColor"
              [title]="event.title">
            </div>
          }
          @if (item.events.length > 3) {
            <span class="more-events">+{{ item.events.length - 3 }}</span>
          }
        </div>
      </div>
    }
  </div>
</div>
