<div class="upcoming-events" role="complementary" aria-label="Upcoming events">
  <div class="upcoming-title">{{ title }}</div>
  <app-upcoming-event-row
    *ngFor="let event of upcomingEvents; trackBy: trackByEvent"
    [event]="event"
    (eventClicked)="eventClicked.emit($event)">
  </app-upcoming-event-row>
  <div class="no-events" *ngIf="upcomingEvents.length === 0">No upcoming events</div>
</div>
