<!-- The shared event chip: a colored spine and a tinted fill from the event's own
     colours, so it reads the same in week, day and month. Text inherits the
     event's primary colour, keeping it legible on either theme. -->
<div class="h-full overflow-hidden cursor-pointer rounded-lg border-l-[3px] px-2 py-1 text-xs"
     [style.background-color]="event.color.secondaryColor"
     [style.border-left-color]="event.color.primaryColor"
     [style.color]="event.color.primaryColor">
  <div class="truncate font-semibold">{{ event.title }}</div>
  <div class="truncate text-[11px] opacity-85">{{ formattedTime }}</div>
  @if (event.description) {
    <div class="truncate text-[11px] opacity-75">{{ event.description }}</div>
  }
</div>
