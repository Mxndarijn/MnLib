<div class="calendar-event-default" [style.background-color]="event.color.secondaryColor" [style.border-left-color]="event.color.primaryColor">
  <div class="event-title">{{ event.title }}</div>
  <div class="event-time">{{ formattedTime }}</div>
  <div class="event-description" *ngIf="event.description">{{ event.description }}</div>
</div>
