<div class="flex flex-col h-full" [class.is-fullwidth]="props.fullWidth">
  @if (uiConfig.label || props.label) {
    <label class="pl-2 pb-1 flex flex-row gap-x-0.5! text-base!" [attr.for]="resolvedId">
      <p>{{ uiConfig.label || props.label }}</p>
      @if (isRequired()) {
        <span class="text-red-500">*</span>
      }
    </label>
  }

  <input
    #dateInput
    [id]="resolvedId"
    [attr.name]="resolvedName"
    [type]="resolvedMode"
    [attr.placeholder]="uiConfig.placeholder || props.placeholder || null"
    [attr.aria-label]="uiConfig.ariaLabel || uiConfig.label || props.label || null"
    [attr.aria-invalid]="showError || null"
    [attr.aria-describedby]="showError ? resolvedId + '-error' : null"
    [disabled]="isDisabled"
    [attr.min]="props.min || null"
    [attr.max]="props.max || null"
    [attr.step]="props.step || null"
    [value]="value ?? ''"
    [ngClass]="inputClasses"
    (click)="dateInput.showPicker()"
    (input)="handleInput(($any($event.target)).value)"
    (blur)="handleBlur()"
  />

  @if (showError) {
    @if (props.showAllErrors) {
      <div class="flex flex-col gap-y-1">
        @for (error of errorMessages; track $index) {
          <mn-error-message [errorMessage]="error" [id]="resolvedId + '-' + $index"></mn-error-message>
        }
      </div>
    } @else {
      @if (errorMessage !== null) {
        <mn-error-message [errorMessage]="errorMessage" [id]="resolvedId"></mn-error-message>
      }
    }
  }
</div>
