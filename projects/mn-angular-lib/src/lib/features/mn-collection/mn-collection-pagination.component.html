<!-- Load more button -->
@if (showLoadMore) {
  <div class="flex justify-center py-4">
    <button
      (click)="loadMore.emit()"
      [data]="{ size: 'sm', variant: 'outline', color: 'primary' }"
      [disabled]="loadingMoreRows"
      class="px-4 py-1.5 text-sm rounded border border-primary-500 text-primary-500 hover:bg-primary-100 transition-colors disabled:opacity-50"
      mnButton
    >
      @if (loadingMoreRows) {
        <span
          class="inline-block w-3 h-3 border-2 border-primary-500 border-t-transparent rounded-full animate-spin mr-2"></span>
      }
      {{ labels?.loadMore || 'Load more' }}
    </button>
  </div>
}

<!-- Pagination controls -->
@if (showPagination) {
  <div class="flex items-center justify-between gap-2 px-2 py-3 text-sm text-base-content">
    @if (pageSizeSelectOptions.length > 1) {
      <div class="hidden md:flex items-center gap-2">
        <span>{{ labels?.rowsPerPage || 'Items per page:' }}</span>
        <mn-lib-select
          (ngModelChange)="pageSizeChange.emit($event)"
          [ngModel]="pageSize"
          [props]="{
            id: idPrefix + '-page-size',
            options: pageSizeSelectOptions,
            size: 'sm'
          }"
        ></mn-lib-select>
      </div>
    } @else {
      <div class="hidden md:block"></div>
    }

    <!-- Narrow viewports state the page position outright: the strip's last-page
         anchor only appears once the window stops reaching the end, so it can't
         be relied on to carry the total. -->
    <span aria-live="polite" class="md:hidden text-xs opacity-70 whitespace-nowrap">{{ pageIndicatorLabel }}</span>

    <div class="flex flex-wrap items-center justify-center gap-0.5 md:gap-1">
      <span class="text-xs mr-2 hidden md:inline">{{ itemRangeLabel }}</span>

      <button
        (click)="pageChange.emit(1)"
        [data]="{ size: 'sm', variant: 'outline', color: 'secondary', disabled: currentPage === 1 }"
        [disabled]="currentPage === 1"
        aria-label="First page"
        class="px-2 py-1 rounded border border-base-300 hover:bg-base-200 transition-colors disabled:opacity-40 disabled:cursor-not-allowed aspect-square leading-none"
        mnButton
      >«
      </button>

      <button
        (click)="pageChange.emit(currentPage - 1)"
        [data]="{ size: 'sm', variant: 'outline', color: 'secondary', disabled: currentPage === 1 }"
        [disabled]="currentPage === 1"
        aria-label="Previous page"
        class="px-2 py-1 rounded border border-base-300 hover:bg-base-200 transition-colors disabled:opacity-40 disabled:cursor-not-allowed aspect-square leading-none"
        mnButton
      >‹
      </button>

      @for (slot of pageSlots; track $index) {
        <span [class]="slotVisibility(slot)">
          @if (slot.page !== null) {
            <button
              (click)="pageChange.emit(slot.page)"
              [attr.aria-current]="slot.page === currentPage ? 'page' : null"
              [attr.aria-label]="'Page ' + slot.page"
              [data]="{ size: 'sm', variant: 'text', color: slot.page === currentPage ? 'primary' : 'gray' }"
              class="px-1.5 md:px-2.5 py-1 rounded underline underline-offset-2 transition-colors text-xs"
              mnButton
            >{{ slot.page }}
            </button>
          } @else {
            <span aria-hidden="true" class="px-0.5 text-xs opacity-50 select-none">…</span>
          }
        </span>
      }

      <button
        (click)="pageChange.emit(currentPage + 1)"
        [data]="{ size: 'sm', variant: 'outline', color: 'secondary', disabled: currentPage === totalPages }"
        [disabled]="currentPage === totalPages"
        aria-label="Next page"
        class="px-2 py-1 rounded border border-base-300 hover:bg-base-200 transition-colors disabled:opacity-40 disabled:cursor-not-allowed aspect-square leading-none"
        mnButton
      >›
      </button>

      <button
        (click)="pageChange.emit(totalPages)"
        [data]="{ size: 'sm', variant: 'outline', color: 'secondary', disabled: currentPage === totalPages }"
        [disabled]="currentPage === totalPages"
        aria-label="Last page"
        class="px-2 py-1 rounded border border-base-300 hover:bg-base-200 transition-colors disabled:opacity-40 disabled:cursor-not-allowed aspect-square leading-none"
        mnButton
      >»
      </button>
    </div>
  </div>
}
